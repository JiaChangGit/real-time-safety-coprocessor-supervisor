# prj_debug.conf - DEBUG build (人工故障注入用)
#
# 用法 (擇一)：
#   west build -b qemu_cortex_a53/qemu_cortex_a53/smp . -- \
#       -DOVERLAY_CONFIG=prj_debug.conf
#   或設 CONF_FILE 取代 prj.conf。
#
# 本檔在 FORMAL (prj.conf) 基礎上加開 Zephyr shell/logging，僅供手動觀察。
#
# !!! 注意 (debug-only) !!!
#   shell 與二進位協定共用同一條 console UART (PL011)。開啟 shell 後，shell 的
#   文字輸出會與協定 frame 交錯，因此「正式 host 協定 demo 不可用此 build」。
#   DEBUG build 僅供工程師在終端機手動敲指令觸發/清除故障旗標。

CONFIG_SMP=y
CONFIG_MP_MAX_NUM_CPUS=2
CONFIG_SCHED_CPU_MASK=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_BOOT_BANNER=y

# ---- DEBUG 差異：開啟 shell ----
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
# shell backend thread 需要足夠 stack 處理 safety status 多行輸出
CONFIG_SHELL_STACK_SIZE=2048

# 方便除錯：開 thread 名稱與 runtime stats / kernel shell
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_KERNEL_SHELL=y
