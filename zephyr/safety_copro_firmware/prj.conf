# prj.conf - FORMAL build：single binary protocol UART only.

CONFIG_MULTITHREADING=y
CONFIG_SMP=y
CONFIG_MP_MAX_NUM_CPUS=2
CONFIG_SCHED_CPU_MASK=y

CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Formal binary UART must stay free of console/log/shell text.
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_PRINTK=n
CONFIG_SHELL=n

# Unused subsystems stay off in the formal build.
CONFIG_BT=n
CONFIG_NETWORKING=n
CONFIG_WIFI=n
CONFIG_FILE_SYSTEM=n
CONFIG_SENSOR=n
CONFIG_SETTINGS=n
CONFIG_MBEDTLS=n
CONFIG_NEWLIB_LIBC=n

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024

CONFIG_HEAP_MEM_POOL_SIZE=0
CONFIG_BOOT_BANNER=n
